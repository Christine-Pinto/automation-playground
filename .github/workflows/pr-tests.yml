name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.filter.outputs.changes }}
      pact: ${{ steps.filter.outputs.pact-practice }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            automationintesting: ['tests/ui/automationintesting/**', 'tests/api/automationintesting/**']
            qaautomationlabs: ['tests/ui/qaautomationlabs/**']
            saucedemo: ['tests/ui/saucedemo/**']
            the-internet: ['tests/ui/the-internet/**']
            demoqa: ['tests/ui/demoqa/**']
            uitestingplayground: ['tests/ui/uitestingplayground/**']
            pact-practice: ['tests/pact-practice/**']

  ui-and-api-tests:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.sites != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run tests for changed subprojects
        env:
          CHANGED_SITES: ${{ needs.detect-changes.outputs.sites }}
        run: |
          for site in $(echo "$CHANGED_SITES" | jq -r '.[]'); do
            if [ "$site" = "automationintesting" ]; then
              npx playwright test --project=automationintesting --project=api-automationintesting
            elif [ "$site" != "pact-practice" ]; then
              npx playwright test --project="$site"
            fi
          done
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  pact-tests:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.pact == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run test:pact
        env:
          PACT_DO_NOT_TRACK: 'true'

  # ui-and-api-tests / pact-tests are conditional on which subproject a PR
  # touches, so their check names don't reliably appear on every PR. This
  # job always runs and fails only if a job that *did* run actually failed,
  # so it's the one stable check to require in branch protection.
  pr-checks-required:
    needs: [ui-and-api-tests, pact-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependent job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
